<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat & Transfer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-bar">
        <h1>P2P Connect</h1>
    </div>

    <div class="container">
        <div class="card connection-card">
            <h3>Connect via QR</h3>
            <div class="qr-section">
                <div id="my-qr"></div>
                <p>Tumhara ID:</p>
                <strong id="my-id">Generating...</strong>
            </div>
            <button class="btn" id="start-scan-btn">Scan QR Code</button>
            <div id="reader" style="display: none;"></div>
            
            <hr style="width: 100%;">
            
            <div class="manual-connect-area">
                <input type="text" id="peer-id-input" placeholder="Friend ki ID yahan daalo...">
                <button class="btn" id="connect-btn">Connect</button>
            </div>
            
            <p id="connection-status">Status: Disconnected</p>
        </div>

        <div class="card chat-card" id="chat-section" style="display: none;">
            <div class="chat-box" id="chat-box"></div>
            
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Message likho...">
                <button class="btn" id="send-msg-btn">Send</button>
            </div>

            <hr>

            <div class="file-area">
                <label class="file-label">Select Files:</label>
                <input type="file" id="file-input" multiple>
                <button class="btn" id="send-file-btn">Send Files</button>
            </div>
            
            <div class="progress-area" id="progress-area"></div>
        </div>

        <div class="card files-card" id="files-section" style="display: none;">
            <h3>Received Files</h3>
            <ul id="received-list"></ul>
            <button class="btn" id="download-all-btn" style="width: 100%;">Download All (ZIP)</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
